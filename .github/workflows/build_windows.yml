name: Build Windows EXE

# Se ejecuta al hacer push a main/master, al crear un tag v*.*.* ,
# o manualmente desde la pestaña Actions de GitHub.
on:
  push:
    branches: [main, master]
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Versión del release (ej: 1.0.0)"
        required: false
        default: "dev"

jobs:
  build:
    name: PyInstaller → AimaraPos.exe
    runs-on: windows-latest

    steps:
      # ── 1. Obtener el código ─────────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. Configurar Python 3.11 x64 ───────────────────────────────────────
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"
          cache: "pip"

      # ── 3. Instalar dependencias ─────────────────────────────────────────────
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller "reportlab>=4.0" "python-barcode[images]>=0.15" "Pillow>=10.0"

      # ── 4. Construir el ejecutable ───────────────────────────────────────────
      - name: Construir AimaraPos.exe
        run: pyinstaller aimara_pos.spec --clean --noconfirm

      # ── 5. Verificar que el exe existe ───────────────────────────────────────
      - name: Verificar build
        run: |
          if (Test-Path "dist\AimaraPos.exe") {
            $size = (Get-Item "dist\AimaraPos.exe").Length / 1MB
            Write-Host "✅ AimaraPos.exe generado (~$([math]::Round($size,1)) MB)"
          } else {
            Write-Error "❌ dist\AimaraPos.exe no encontrado"
            exit 1
          }

      # ── 6. Subir como artefacto de la acción ────────────────────────────────
      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: AimaraPos-Windows-x64
          path: dist/AimaraPos.exe
          retention-days: 30

      # ── 7. Crear Release en GitHub (solo en tags v*.*.*) ─────────────────────
      - name: Crear GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Aimara POS ${{ github.ref_name }}"
          body: |
            ## Aimara POS ${{ github.ref_name }}

            ### Instalación
            1. Descarga `AimaraPos.exe`
            2. Colócalo en una carpeta propia (ej: `C:\AimaraPos\`)
            3. Ejecuta `AimaraPos.exe` con doble clic
            4. El navegador se abre automáticamente en `http://127.0.0.1:8765`
            5. La base de datos `pos_aimara.db` se crea junto al `.exe`

            > **Nota:** No requiere Python instalado.
          files: dist/AimaraPos.exe
          draft: false
          prerelease: false
